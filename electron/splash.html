<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self'; style-src 'unsafe-inline' 'self';" />
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; width: 100vw; height: 100vh; display: grid; place-items: center; background: transparent; color: #f8fafc; font-family: Inter, ui-sans-serif, system-ui, sans-serif; }
    .card { width: 480px; height: 280px; border-radius: 28px; overflow: hidden; position: relative; display: grid; place-items: center; background: radial-gradient(circle at 25% 10%, rgba(255,104,48,.17), transparent 35%), radial-gradient(circle at 80% 20%, rgba(237,47,153,.15), transparent 38%), #09111d; border: 1px solid rgba(255,255,255,.12); box-shadow: 0 35px 90px rgba(0,0,0,.55); }
    .card::after { content: ''; position: absolute; inset: 0; background: linear-gradient(120deg, transparent 35%, rgba(255,255,255,.06), transparent 65%); transform: translateX(-100%); animation: shine 2.3s infinite; }
    .content { text-align: center; position: relative; z-index: 2; }
    img { width: 94px; height: 94px; border-radius: 24px; box-shadow: 0 16px 40px rgba(250, 74, 102, .26); }
    h1 { margin: 16px 0 2px; font-size: 29px; letter-spacing: -.04em; }
    h1 span { background: linear-gradient(90deg, #ff7438, #ff4c8d); -webkit-background-clip: text; color: transparent; }
    p { margin: 0; color: #93a0b3; font-size: 13px; }
    .loader { width: 190px; height: 3px; background: rgba(255,255,255,.09); border-radius: 99px; margin: 22px auto 0; overflow: hidden; }
    .loader::before { content: ''; display: block; width: 45%; height: 100%; border-radius: inherit; background: linear-gradient(90deg, #ff7b32, #ef3a9a); animation: load 1.15s ease-in-out infinite; }
    @keyframes load { from { transform: translateX(-115%); } to { transform: translateX(330%); } }
    @keyframes shine { to { transform: translateX(100%); } }
  </style>
</head>
<body>
  <main class="card">
    <div class="content">
      <img src="./icon.png" alt="R|X DC" />
      <h1><span>R|X</span> DC</h1>
      <p>Starting your local desktop companion…</p>
      <div class="loader"></div>
    </div>
  </main>
</body>
</html>
