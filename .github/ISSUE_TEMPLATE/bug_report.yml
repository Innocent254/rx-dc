name: Bug report
description: Report a reproducible defect in R|X DC
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Before filing, open Settings → Diagnostics and include relevant non-sensitive log details.
  - type: input
    id: version
    attributes:
      label: R|X DC version
      placeholder: 1.0.0
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Desktop operating system
      options: [Windows, macOS, Linux]
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: Phone model and Android/HyperOS version
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      placeholder: Tell us exactly what happened.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Remove serial numbers, IP addresses, and other private information.
      render: shell
