name: Publish release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: win
            arch: x64
            goos: windows
            goarch: amd64
          - os: windows-latest
            target: win
            arch: arm64
            goos: windows
            goarch: arm64
          - os: ubuntu-latest
            target: linux
            arch: x64
            goos: linux
            goarch: amd64
          - os: ubuntu-latest
            target: linux
            arch: arm64
            goos: linux
            goarch: arm64
          - os: macos-latest
            target: mac
            arch: x64
            goos: darwin
            goarch: amd64
          - os: macos-latest
            target: mac
            arch: arm64
            goos: darwin
            goarch: arm64

    runs-on: ${{ matrix.os }}
    env:
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
      CGO_ENABLED: '0'
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.16.0'
          cache: npm
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'
          cache: false
      - run: npm ci
      - name: Build installers
        run: npm run dist -- --${{ matrix.target }} --${{ matrix.arch }}
      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}-${{ matrix.arch }}
          path: |
            release/*
            !release/*-unpacked/**
            !release/mac*/**
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" release-assets/* --generate-notes --title "R|X DC ${GITHUB_REF_NAME}"
