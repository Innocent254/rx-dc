name: Build installers

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: installers-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: win
            arch: x64
            goos: windows
            goarch: amd64
          - os: windows-latest
            target: win
            arch: arm64
            goos: windows
            goarch: arm64
          - os: ubuntu-latest
            target: linux
            arch: x64
            goos: linux
            goarch: amd64
          - os: ubuntu-latest
            target: linux
            arch: arm64
            goos: linux
            goarch: arm64
          - os: macos-latest
            target: mac
            arch: x64
            goos: darwin
            goarch: amd64
          - os: macos-latest
            target: mac
            arch: arm64
            goos: darwin
            goarch: arm64

    runs-on: ${{ matrix.os }}
    env:
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
      CGO_ENABLED: '0'
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.16.0'
          cache: npm

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'
          cache: false

      - name: Install dependencies
        run: npm ci

      - name: Build ${{ matrix.target }} ${{ matrix.arch }} installers
        run: npm run dist -- --${{ matrix.target }} --${{ matrix.arch }}

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: rx-dc-${{ matrix.target }}-${{ matrix.arch }}
          path: |
            release/*
            !release/*-unpacked/**
            !release/mac*/**
          if-no-files-found: error
          retention-days: 14
